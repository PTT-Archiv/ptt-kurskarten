<div class="snippet-frame">
  <div #osdContainer class="osd-container" aria-label="Archiv-Ausschnitt"></div>
  @if (showCenterMarker) {
    <div class="osd-center-marker" aria-hidden="true">
      <span class="marker-dot"></span>
    </div>
  }
  <div class="snippet-controls">
    <button class="ghost-btn" type="button" (click)="zoomIn()" aria-label="Zoom in">
      <fa-icon [icon]="zoomInIcon"></fa-icon>
    </button>
    <button class="ghost-btn" type="button" (click)="zoomOut()" aria-label="Zoom out">
      <fa-icon [icon]="zoomOutIcon"></fa-icon>
    </button>
    <button class="ghost-btn" type="button" (click)="reset()" aria-label="Reset view">
      <fa-icon [icon]="resetIcon"></fa-icon>
    </button>
  </div>
</div>
