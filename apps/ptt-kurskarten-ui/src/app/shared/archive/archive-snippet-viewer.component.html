<div class="snippet-frame" [class.fill-frame]="fillFrame">
  <div #osdContainer class="osd-container" [attr.aria-label]="'viewer.archiveSnippetAriaLabel' | transloco"></div>
  @if (showCenterMarker) {
    <div class="osd-center-marker" aria-hidden="true">
      <span class="marker-dot"></span>
    </div>
  }
  <div class="snippet-controls">
    <button class="button button--ghost button--compact button--icon archive-snippet-viewer__control" type="button" (click)="zoomIn()" [attr.aria-label]="'viewer.zoomIn' | transloco">
      <fa-icon [icon]="zoomInIcon"></fa-icon>
    </button>
    <button class="button button--ghost button--compact button--icon archive-snippet-viewer__control" type="button" (click)="zoomOut()" [attr.aria-label]="'viewer.zoomOut' | transloco">
      <fa-icon [icon]="zoomOutIcon"></fa-icon>
    </button>
    <button class="button button--ghost button--compact button--icon archive-snippet-viewer__control" type="button" (click)="reset()" [attr.aria-label]="'viewer.resetSnippetView' | transloco">
      <fa-icon [icon]="resetIcon"></fa-icon>
    </button>
  </div>
</div>
