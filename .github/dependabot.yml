version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Europe/Zurich
    open-pull-requests-limit: 10

  - package-ecosystem: npm
    directory: /apps/ptt-kurskarten-ui
    schedule:
      interval: weekly
      day: monday
      time: "05:05"
      timezone: Europe/Zurich
    open-pull-requests-limit: 10

  - package-ecosystem: npm
    directory: /apps/ptt-kurskarten.api
    schedule:
      interval: weekly
      day: monday
      time: "05:10"
      timezone: Europe/Zurich
    open-pull-requests-limit: 10

  - package-ecosystem: npm
    directory: /packages/shared
    schedule:
      interval: weekly
      day: monday
      time: "05:15"
      timezone: Europe/Zurich
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:20"
      timezone: Europe/Zurich
    open-pull-requests-limit: 10
