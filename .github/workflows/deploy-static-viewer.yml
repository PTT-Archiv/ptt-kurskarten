name: Deploy Static Viewer

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute base href
        id: base
        run: |
          OWNER="${GITHUB_REPOSITORY%%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          if [ "$REPO" = "${OWNER}.github.io" ]; then
            BASE_HREF="/"
          else
            BASE_HREF="/${REPO}/"
          fi
          echo "value=$BASE_HREF" >> "$GITHUB_OUTPUT"

      - name: Build shared package
        run: npm run build --workspace @ptt-kurskarten/shared

      - name: Build static viewer
        run: npm run build:static --workspace ptt-kurskarten-ui -- --base-href "${{ steps.base.outputs.value }}" --delete-output-path=true

      - name: Prepare Pages artifact
        id: artifact
        run: |
          DIST_ROOT="apps/ptt-kurskarten-ui/dist/ptt-kurskarten-ui"
          SITE_DIR="$DIST_ROOT/browser"
          if [ ! -f "$SITE_DIR/index.html" ]; then
            SITE_DIR="$DIST_ROOT"
          fi
          cp "$SITE_DIR/index.html" "$SITE_DIR/404.html"
          echo "site_dir=$SITE_DIR" >> "$GITHUB_OUTPUT"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.artifact.outputs.site_dir }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
