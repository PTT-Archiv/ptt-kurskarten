name: Security Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate production audit report
        run: npm audit --workspaces --omit=dev --json > npm-audit-report.json || true

      - name: Upload audit report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit-report.json

      - name: Fail on high or critical vulnerabilities
        run: |
          node -e "const fs=require('node:fs');const report=JSON.parse(fs.readFileSync('npm-audit-report.json','utf8'));const v=report.metadata?.vulnerabilities??{};const high=Number(v.high??0);const critical=Number(v.critical??0);console.log('Audit summary:',v);if(high>0||critical>0){process.exit(1)}"
